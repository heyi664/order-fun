<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HYEEE</title>
  <!-- 引入样式 -->
  <link rel="stylesheet" href="./css/element.css">

  <link href="./css/index.css" rel="stylesheet">
  <link href="./css/main.css" rel="stylesheet">

  <style type="text/css">
      .el-input__inner {
          border-radius: 20px;
      }
  </style>
</head>
<body>
<div id="app" class="page-with-nav home-page">
  <div class="search-bar">
    <div class="city-btn">杭州 <i class="el-icon-arrow-down"></i></div>
    <div class="search-input">
      <el-input size="mini" placeholder="请输入商户名、地点">
        <i slot="prefix" class="el-input__icon el-icon-search"></i>
      </el-input>
    </div>
    <div class="header-icon" @click="toPage(4)"><i class="el-icon-user"></i></div>
  </div>
  <div class="quick-entry-list">
    <a class="quick-entry" href="/chat.html" @click="goQuickEntry($event, '/chat.html')">
      <span class="quick-entry-icon ai-icon"><img src="/imgs/home/ai-chat.png" alt="AI聊天"></span>
      <span class="quick-entry-text">AI 聊天</span>
    </a>
    <a class="quick-entry" href="/shop-list.html?type=1&amp;name=%E7%BE%8E%E9%A3%9F" @click="goQuickEntry($event, '/shop-list.html?type=1&amp;name=%E7%BE%8E%E9%A3%9F')">
      <span class="quick-entry-icon food-icon"><img src="/imgs/home/food.png" alt="美食"></span>
      <span class="quick-entry-text">美食</span>
    </a>
    <a class="quick-entry" href="/shop-list.html?type=2&amp;name=KTV" @click="goQuickEntry($event, '/shop-list.html?type=2&amp;name=KTV')">
      <span class="quick-entry-icon ktv-icon"><img src="/imgs/home/ktv.png" alt="KTV"></span>
      <span class="quick-entry-text">KTV</span>
    </a>
    <a class="quick-entry" href="/shop-list.html?type=11&amp;name=%E7%94%B5%E5%BD%B1" @click="goQuickEntry($event, '/shop-list.html?type=11&amp;name=%E7%94%B5%E5%BD%B1')">
      <span class="quick-entry-icon movie-icon"><img src="/imgs/home/movie.png" alt="电影"></span>
      <span class="quick-entry-text">电影</span>
    </a>
  </div>
  <div class="home-main">
    <div class="blog-list" @scroll="onScroll">
      <div class="blog-box" v-for="b in blogs" :key="b.id">
        <div class="blog-img" @click="toBlogDetail(b)"><img :src="b.img" alt=""></div>
        <div class="blog-title">{{b.title}}</div>
        <div class="blog-foot">
          <div class="blog-user-icon"><img :src="b.icon || '/imgs/icons/default-icon.png'" alt=""></div>
          <div class="blog-user-name">{{b.name}}</div>
          <div class="blog-liked" @click="addLike(b)">
            <svg t="1646634642977" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="2187" width="14" height="14">
              <path d="M160 944c0 8.8-7.2 16-16 16h-32c-26.5 0-48-21.5-48-48V528c0-26.5 21.5-48 48-48h32c8.8 0 16 7.2 16 16v448zM96 416c-53 0-96 43-96 96v416c0 53 43 96 96 96h96c17.7 0 32-14.3 32-32V448c0-17.7-14.3-32-32-32H96zM505.6 64c16.2 0 26.4 8.7 31 13.9 4.6 5.2 12.1 16.3 10.3 32.4l-23.5 203.4c-4.9 42.2 8.6 84.6 36.8 116.4 28.3 31.7 68.9 49.9 111.4 49.9h271.2c6.6 0 10.8 3.3 13.2 6.1s5 7.5 4 14l-48 303.4c-6.9 43.6-29.1 83.4-62.7 112C815.8 944.2 773 960 728.9 960h-317c-33.1 0-59.9-26.8-59.9-59.9v-455c0-6.1 1.7-12 5-17.1 69.5-109 106.4-234.2 107-364h41.6z m0-64h-44.9C427.2 0 400 27.2 400 60.7c0 127.1-39.1 251.2-112 355.3v484.1c0 68.4 55.5 123.9 123.9 123.9h317c122.7 0 227.2-89.3 246.3-210.5l47.9-303.4c7.8-49.4-30.4-94.1-80.4-94.1H671.6c-50.9 0-90.5-44.4-84.6-95l23.5-203.4C617.7 55 568.7 0 505.6 0z" p-id="2188" :fill="b.isLike ? '#ff6633' : '#82848a'"></path>
            </svg>
            {{b.liked}}
          </div>
        </div>
      </div>
    </div>
    <aside class="topic-rank-panel">
      <div class="topic-rank-head">
        <div>
          <div class="topic-rank-kicker">Realtime</div>
          <div class="topic-rank-title">实时话题榜</div>
        </div>
        <div class="topic-rank-city">杭州</div>
      </div>
      <div class="topic-rank-sub">汇总带 #话题 帖子的浏览、点赞与评论</div>
      <div class="topic-rank-list">
        <div class="topic-rank-item" v-for="topic in hotTopics" :key="topic.id" @click="toTopic(topic)">
          <div class="topic-rank-no" :class="{top: topic.rank <= 3}">{{topic.rank}}</div>
          <div class="topic-rank-info">
            <div class="topic-rank-name">#{{topic.name}}</div>
            <div class="topic-rank-meta">
              <span>{{topic.heat}} 热度</span>
              <span :class="['topic-trend', topic.trend]">{{topic.trendText}}</span>
            </div>
          </div>
        </div>
        <div class="topic-rank-empty" v-if="hotTopics.length === 0">暂无带 #话题 的帖子</div>
      </div>
    </aside>
  </div>
  <foot-bar :active-btn="1"></foot-bar>
</div>
<script src="./js/vue.js"></script>
<script src="./js/axios.min.js"></script>
<!-- 引入组件库 -->
<script src="./js/element.js"></script>
<script src="./js/common.js"></script>
<script src="./js/footer.js"></script>
<script>

  const app = new Vue({
    el: "#app",
    data: {
      isReachBottom: false,
      blogs: [], // 播客列表
      current: 1,// blog的页码
      hotTopics: [],
      topicRefreshTimer: null,
      currentTopicId: null,
    },
    created() {
      this.queryHotBlogsScroll();
      this.queryHotTopics();
      this.topicRefreshTimer = setInterval(this.queryHotTopics, 10000);
    },
    beforeDestroy() {
      clearInterval(this.topicRefreshTimer);
    },
    methods: {
      queryHotBlogsScroll() {
        axios.get("/blog/hot?current=" + this.current)
          .then(({data}) => {
            data.forEach(b => b.img = b.images.split(",")[0]);
            this.blogs = this.blogs.concat(data);
          })
          .catch(err => {
            this.$message.error(err)
          })
      },
      addLike(b) {
        axios.put("/blog/like/" +b.id)
          .then(({data}) => {
            this.queryBlogById(b)
          })
          .catch(err => {
            this.$message.error(err)
          })
      },
      queryHotTopics() {
        const previousRanks = {};
        this.hotTopics.forEach(topic => previousRanks[topic.id] = topic.rank);
        axios.get("/topics/hot?limit=8")
          .then(({data}) => {
            this.hotTopics = data.map(topic => {
              const previousRank = previousRanks[topic.id];
              const isUp = previousRank && topic.rank < previousRank;
              return Object.assign({}, topic, {
                heat: this.formatHeat(topic.heat),
                trend: isUp ? "up" : (topic.rank <= 3 ? "hot" : "flat"),
                trendText: isUp ? "上升" : (topic.rank <= 3 ? "热" : "稳定")
              });
            });
          })
          .catch(err => console.log("话题榜加载失败", err));
      },
      formatHeat(value) {
        const heat = Number(value || 0);
        if (heat >= 10000) return (heat / 10000).toFixed(1) + "w";
        if (heat >= 1000) return (heat / 1000).toFixed(1) + "k";
        return heat.toString();
      },
      queryBlogById(b) {
        axios.get("/blog/" + b.id)
          .then(({data}) => {
            b.liked = data.liked;
            b.isLike = data.isLike;
          })
          .catch(() => {
            this.$message.error
            b.liked ++;
          })
      },
      onScroll(e) {
        if (this.currentTopicId) return;
        let scrollTop = e.target.scrollTop;
        let offsetHeight = e.target.offsetHeight;
        let scrollHeight = e.target.scrollHeight;
        if (scrollTop + offsetHeight > scrollHeight && !this.isReachBottom) {
          this.isReachBottom = true

          // 再次查询下一页数据
          this.current++;
          this.queryHotBlogsScroll();
        } else {
          this.isReachBottom = false
        }
      },
      goQuickEntry(event, target) {
        if (!target) return;
        event.preventDefault();
        if (document.documentElement.classList.contains("route-leaving")) return;
        try {
          sessionStorage.setItem("hy_route_transition", "1");
        } catch (error) {
          console.warn("无法记录页面切换状态", error);
        }
        document.documentElement.classList.add("route-leaving");
        window.setTimeout(() => window.location.assign(target), 280);
      },
      toBlogDetail(b) {
        location.href = "/blog-detail.html?id=" + b.id
      },
      toTopic(topic) {
        axios.get("/topics/" + topic.id + "/blogs")
          .then(({data}) => {
            data.forEach(blog => blog.img = blog.images.split(",")[0]);
            this.blogs = data;
            this.$message.success("正在查看 #" + topic.name);
          })
          .catch(this.$message.error)
      },
      toPage(i) {
        if (i === 4) {
          location.href = "/info.html"
        }
      }
    }
  })
</script>
</body>
</html>

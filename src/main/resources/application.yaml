server:
  port: 8081
spring:
  application:
    name: heyee-comments
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/hycomment?useSSL=false&serverTimezone=UTC}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD}
  redis:
    host: ${REDIS_HOST:192.168.23.129}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD}
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
mybatis-plus:
  type-aliases-package: com.heyee.comments.entity # 别名扫描包
logging:
  level:
    com.heyee.comments: debug
  pattern:
    dateformat: mm:ss.SSS
agent:
  service-url: ${AGENT_SERVICE_URL:http://127.0.0.1:8000}
  connect-timeout: ${AGENT_CONNECT_TIMEOUT:3000}
  read-timeout: ${AGENT_READ_TIMEOUT:30000}
mcp:
  server:
    token: ${MCP_SERVER_TOKEN:}
